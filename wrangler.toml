name = "serverless-qrcode-hub"
main = "index.js"
compatibility_date = "2025-03-10"兼容日期 = "2025-03-10"

[[d1_databases]]
binding = "DB"
database_name = "qrcode_hub"数据库名称 = "qrcode_hub"
# 注意：将下面的 id 替换为你自己拷贝的 D1 存储的 id 才能正常使用！
database_id = "1c69f1b2-515d-4877-b422-5a1d8138afff"数据库ID = "1c69f1b2-515d-4877-b422-5a1d8138afff"

[triggers][触发器]
crons = ["0 2 */1 * *"]

[[env.dev.d1_databases]]
binding = "DB"
database_name = "qrcode_hub_dev"
database_id = "1c69f1b2-515d-4877-b422-5a1d8138afff"

[env.dev.triggers][env.dev.触发器]
crons = ["*/10 * * * * *"]

[assets][资产]
directory = "./dist"目录 = "./dist"目录 = "./dist"“./dist”目录 ="./dist"“./dist”“./dist”
binding = "ASSETS"绑定 = "资产"
